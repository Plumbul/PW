<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Smart Home Monitor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container py-4">
        <div class="d-flex justify-content-between mb-4">
            <h1>Енергомоніторинг будинку</h1>
            <div id="status" class="badge bg-danger">Offline</div>
        </div>

        <div class="row g-3" id="stats-container">
            </div>

        <div class="row mt-4">
            <div class="col-md-6"><canvas id="pieChart"></canvas></div>
            <div class="col-md-6"><canvas id="lineChart"></canvas></div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
